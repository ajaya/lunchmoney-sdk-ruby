name: API Spec Monitor

on:
  schedule:
    # Run daily at 8am UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      spec_url:
        description: 'Override OpenAPI spec URL (optional)'
        required: false

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install openapi-generator-cli
        run: |
          npm install -g @openapitools/openapi-generator-cli
          openapi-generator-cli version-manager set 7.20.0

      - name: Fetch latest OpenAPI spec
        env:
          SPEC_URL: ${{ inputs.spec_url || secrets.OPENAPI_SPEC_URL }}
        run: |
          if [ -z "$SPEC_URL" ]; then
            echo "::error::No spec URL provided. Set OPENAPI_SPEC_URL secret or provide via workflow_dispatch input."
            exit 1
          fi
          curl -fsSL "$SPEC_URL" -o /tmp/latest-spec.json
          echo "Downloaded spec:"
          python3 -c "import json; d=json.load(open('/tmp/latest-spec.json')); print(f\"version: {d['info']['version']}, paths: {len(d.get('paths',{}))}, schemas: {len(d.get('components',{}).get('schemas',{}))}\")"

      - name: Check for spec changes
        id: diff
        run: |
          if diff -q openapi/lunchmoney-v2.json /tmp/latest-spec.json > /dev/null 2>&1; then
            echo "No changes detected in the OpenAPI spec."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "OpenAPI spec has changed!"
            echo "changed=true" >> "$GITHUB_OUTPUT"

            # Extract version for branch name
            NEW_VERSION=$(python3 -c "import json; print(json.load(open('/tmp/latest-spec.json'))['info']['version'])")
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

            # Show summary of changes
            echo "### Spec diff summary:" >> "$GITHUB_STEP_SUMMARY"
            diff openapi/lunchmoney-v2.json /tmp/latest-spec.json | head -100 >> "$GITHUB_STEP_SUMMARY" || true
          fi

      - name: Update spec and regenerate SDK
        if: steps.diff.outputs.changed == 'true'
        run: |
          # Update the committed spec
          cp /tmp/latest-spec.json openapi/lunchmoney-v2.json

          # Regenerate SDK
          openapi-generator-cli generate \
            -i openapi/lunchmoney-v2.json \
            -g ruby \
            -o . \
            --additional-properties=gemName=lunchmoney-sdk-ruby,moduleName=LunchMoney \
            --skip-validate-spec

      - name: Apply post-generation fixes
        if: steps.diff.outputs.changed == 'true'
        run: |
          # Fix known generator bug: empty cookie auth 'in' field
          sed -i "s/in: ,$/in: 'cookie',/" lib/lunchmoney-sdk-ruby/configuration.rb

          # Fix api_client cookie auth support (if overwritten by generator)
          if ! grep -q "when 'cookie'" lib/lunchmoney-sdk-ruby/api_client.rb; then
            sed -i "/when 'query'/a\\        when 'cookie' then header_params['Cookie'] = \"\#{auth_setting[:key]}=\#{auth_setting[:value]}\"" lib/lunchmoney-sdk-ruby/api_client.rb
          fi

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        run: bundle exec rspec

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.diff.outputs.new_version }}"
          BRANCH="auto/update-api-spec-${NEW_VERSION}-$(date +%Y%m%d)"

          git checkout -b "$BRANCH"
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "$(cat <<EOF
          Update SDK for API spec v${NEW_VERSION}

          Auto-generated from the latest Lunch Money OpenAPI spec.
          Detected spec change during daily monitoring.
          EOF
          )"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "Update SDK for API spec v${NEW_VERSION}" \
            --body "$(cat <<'EOF'
          ## Summary
          - Daily API spec monitor detected changes in the Lunch Money OpenAPI specification
          - SDK regenerated with openapi-generator-cli v7.20.0
          - Post-generation fixes applied (cookie auth)
          - Tests pass

          ## Review checklist
          - [ ] Review generated code changes
          - [ ] Check for breaking changes in the API
          - [ ] Update CHANGELOG.md
          - [ ] Bump version in `lib/lunchmoney-sdk-ruby/version.rb` if needed

          🤖 Auto-generated by API Spec Monitor
          EOF
          )" \
            --label "auto-generated"
